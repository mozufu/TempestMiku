plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
def signingEnvironment = [
    keyAlias: System.getenv("TM_ANDROID_RELEASE_KEY_ALIAS"),
    keyPassword: System.getenv("TM_ANDROID_RELEASE_KEY_PASSWORD"),
    storeFile: System.getenv("TM_ANDROID_RELEASE_STORE_FILE"),
    storePassword: System.getenv("TM_ANDROID_RELEASE_STORE_PASSWORD"),
]
def environmentSigningConfigured = signingEnvironment.values().every {
    it != null && !it.toString().trim().isEmpty()
}
def releaseRequested = gradle.startParameter.taskNames.any {
    it.toLowerCase().contains("release")
}
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
} else if (environmentSigningConfigured) {
    signingEnvironment.each { key, value -> keystoreProperties[key] = value }
} else if (releaseRequested) {
    throw new GradleException(
        "Release signing is required. Configure android/key.properties or all TM_ANDROID_RELEASE_* environment variables; debug signing is never used for release builds."
    )
}
def releaseSigningConfigured = keystorePropertiesFile.exists() || environmentSigningConfigured
if (releaseRequested) {
    ["keyAlias", "keyPassword", "storeFile", "storePassword"].each { key ->
        if (!keystoreProperties[key]?.toString()?.trim()) {
            throw new GradleException("Release signing property '${key}' is required.")
        }
    }
    def releaseAlias = keystoreProperties["keyAlias"].toString().trim()
    def releaseStore = file(keystoreProperties["storeFile"].toString())
    if (releaseAlias.equalsIgnoreCase("androiddebugkey") ||
            releaseStore.name.equalsIgnoreCase("debug.keystore")) {
        throw new GradleException(
            "Release signing must not use the Android debug key or debug keystore."
        )
    }
    if (!releaseStore.isFile()) {
        throw new GradleException("Release keystore does not exist: ${releaseStore}")
    }
}

android {
    namespace = "org.mozufu.tempestmiku"
    buildFeatures {
        buildConfig = true
    }
    // flutter_secure_storage 10.x and mobile_scanner's CameraX graph require API 36 headers.
    compileSdk = 36
    ndkVersion = "26.1.10909125"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "org.mozufu.tempestmiku"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (releaseSigningConfigured) {
            release {
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
                storeFile = file(keystoreProperties["storeFile"])
                storePassword = keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        debug {
            // Keep development/device-canary installs isolated from the
            // differently signed production package and its paired state.
            applicationIdSuffix = ".uitest"
            versionNameSuffix = "-uitest"
        }
        release {
            if (releaseSigningConfigured) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "org.unifiedpush.android:connector:3.3.3"
    implementation "androidx.work:work-runtime:2.10.3"
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.5"
    testImplementation "junit:junit:4.13.2"
}

configurations.all {
    def tink = "com.google.crypto.tink:tink-android:1.21.0"
    resolutionStrategy {
        force(tink)
        dependencySubstitution {
            substitute module("com.google.crypto.tink:tink") using module(tink)
        }
    }
}
