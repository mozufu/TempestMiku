plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

if (gradle.startParameter.taskNames.any { it.toLowerCase().contains("release") }) {
    throw new GradleException("The ASR feasibility harness is debug-only.")
}

android {
    namespace = "org.mozufu.tempestmiku.asrbenchmark"
    compileSdk = 36
    ndkVersion = "26.1.10909125"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    defaultConfig {
        applicationId = "org.mozufu.tempestmiku.asrbenchmark"
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = 1
        versionName = "0.1.0"
        ndk {
            abiFilters "arm64-v8a"
        }
    }
}

flutter {
    source = "../.."
}
